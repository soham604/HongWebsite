<!DOCTYPE html>
<html lang="{{lang}}">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{page_title}} — Hong Yue</title>
  <meta name="description" content="{{page_description}}">
  <link rel="icon" type="image/png" href="/assets/favicon.png">
  <link rel="canonical" href="https://hongmultifamilymortgage.com/blog/{{blog_prefix}}">
  <meta name="robots" content="index, follow">
  <meta name="theme-color" content="#111827">
  <link rel="alternate" hreflang="en" href="https://hongmultifamilymortgage.com/blog/">
  <link rel="alternate" hreflang="fr" href="https://hongmultifamilymortgage.com/blog/fr/">
  <link rel="alternate" hreflang="zh" href="https://hongmultifamilymortgage.com/blog/zh/">
  <link rel="alternate" hreflang="x-default" href="https://hongmultifamilymortgage.com/blog/">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://hongmultifamilymortgage.com/blog/{{blog_prefix}}">
  <meta property="og:title" content="{{page_title}} — Hong Yue">
  <meta property="og:description" content="{{page_description}}">
  <meta property="og:site_name" content="Hong Multifamily Mortgage">
  <link rel="stylesheet" href="/assets/blog.css">
</head>
<body>

<nav class="nav">
  <a href="/" class="nav__brand">
    <div class="nav__brand-name">Hong Yue</div>
    <div class="nav__brand-sub">{{nav_sub}}</div>
  </a>
  <ul class="nav__links" id="navLinks">
    <li><a href="/#expertise">{{nav_expertise}}</a></li>
    <li><a href="/#process">{{nav_process}}</a></li>
    <li><a href="/#results">{{nav_results}}</a></li>
    <li><a href="/blog/{{blog_prefix}}" class="active">{{nav_blog}}</a></li>
    <li><a href="/#contact">{{nav_contact}}</a></li>
    <li>
      <div class="nav__lang-switch">
        <a href="/blog/" class="{{active_en}}">EN</a>
        <a href="/blog/fr/" class="{{active_fr}}">FR</a>
        <a href="/blog/zh/" class="{{active_zh}}">中文</a>
      </div>
    </li>
    <li><a href="https://bookings.cloud.microsoft/bookwithme/user/12559410ed614cd79fbab07ae5b61702%40maoki.ca?anonymous&amp;ismsaljsauthenabled=true" class="nav__cta" target="_blank" rel="noopener">{{nav_cta}}</a></li>
  </ul>
  <button class="nav__toggle" id="navToggle" aria-label="Toggle menu">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M4 6h16M4 12h16M4 18h16"/></svg>
  </button>
</nav>

<div class="blog-hero">
  <h1 class="blog-hero__title">{{hero_title}}</h1>
  <p class="blog-hero__sub">{{hero_sub}}</p>
</div>

<div class="blog-listing">
  <div class="blog-grid">
    {{cards}}
  </div>
</div>

<footer class="footer">
  <div class="footer__inner">
    <div class="footer__brand-name">Hong Yue</div>
    <div class="footer__copy">&copy; 2026 Hong Yue. {{footer_rights}}</div>
    <div class="footer__links">
      <a href="/">{{nav_home}}</a>
      <a href="/blog/{{blog_prefix}}">{{nav_blog}}</a>
      <a href="/#contact">{{nav_contact}}</a>
    </div>
  </div>
</footer>

<script>
  document.getElementById('navToggle').addEventListener('click', () => {
    document.getElementById('navLinks').classList.toggle('open');
  });
</script>
</body>
</html>
